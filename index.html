<!DOCTYPE html>
<html>
<head>
    <title>Find Your Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
 
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
 
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 340px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }
 
        h3 {
            text-align: center;
            margin-bottom: 20px;
        }
 
        /* Remove default B2C list */
        #api ul {
            list-style: none;
            padding: 0;
        }
 
        #api li {
            margin-bottom: 15px;
        }
 
        /* Style textbox */
        input[type="text"] {
            width: 100% !important;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
 
        /* Style radio buttons */
        input[type="radio"] {
            margin-right: 8px;
        }
 
        /* Buttons */
        .buttons {
            margin-top: 15px;
        }
 
        #continue {
            width: 100%;
            padding: 10px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
        }
 
        /* Hide unwanted B2C elements */
        .helpLink {
            display: none !important;
        }
    </style>
</head>
 
<body>
 
<div class="wrapper">
    <div class="card">
        <h3>Find Your Account</h3>
 
        <!-- B2C injects fields -->
        <div id="api"></div>
    </div>
</div>
 
<script>
function updatePlaceholder() {
    const textbox = document.querySelector('input[type="text"]');
    const selected = document.querySelector('input[type="radio"]:checked');
 
    if (!textbox || !selected) return;
 
    const id = selected.id;
 
    if (id.includes("email")) {
        textbox.placeholder = "Enter your email address";
    }
    else if (id.includes("phone")) {
        textbox.placeholder = "Enter your phone number";
    }
    else {
        textbox.placeholder = "Enter your account ID";
    }
}
 
/* Keep updating because B2C re-renders */
setInterval(updatePlaceholder, 300);
</script>
 
</body>
</html>
