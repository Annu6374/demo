<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collect Identifier</title>
</head>
<body>
  <form id="selfAssertedForm">
  <input type="radio" name="identifierType" value="email" checked>Email Address<br/>
  <input type="radio" name="identifierType" value="phone">Phone Number<br/>
  <input type="radio" name="identifierType" value="accountId">Account ID<br/>

  <input id="identifierValue" name="identifierValue" type="text" placeholder="Enter value" required />

  <button id="continue" type="submit">Continue</button>
  <button id="cancel" type="button">Cancel</button>
</form>
