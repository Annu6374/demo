<!DOCTYPE html>
<html>
<head>
    <title>Find Your Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }
 
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
 
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
 
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
 
        #api ul {
            list-style: none;
            padding: 0;
        }
 
        #api li {
            margin-bottom: 15px;
        }
 
        input[type="text"] {
            width: 100% !important;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
 
        .buttons {
            display: flex !important;
            justify-content: space-between;
            margin-top: 15px;
        }
 
        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
 
        #continue {
            background: #0078d4;
            color: white;
            width: 48%;
        }
 
        #continue:hover {
            background: #005ea6;
        }
 
        #cancel {
            background: #ccc;
            width: 48%;
        }
 
        /* Optional: hide "What is this?" links */
        .helpLink {
            display: none !important;
        }
 
    </style>
</head>
 
<body>
 
<div class="page-wrapper">
    <div class="container">
        <h2>Find Your Account</h2>
 
        <!-- B2C injects fields here -->
        <div id="api"></div>
 
    </div>
</div>
 
<script>
function applyLogic() {
 
    const textbox = document.querySelector('input[type="text"]');
 
    if (!textbox) return;
 
    function updatePlaceholder() {
 
        const selected = document.querySelector('input[type="radio"]:checked');
        if (!selected) return;
 
        const id = selected.id;
 
        if (id.includes("email")) {
            textbox.placeholder = "Enter your email address";
        }
        else if (id.includes("phone")) {
            textbox.placeholder = "Enter your phone number";
        }
        else if (id.includes("accountId")) {
            textbox.placeholder = "Enter your account ID";
        }
    }
 
    // Run once
    updatePlaceholder();
 
    // Listen for changes
    const radios = document.querySelectorAll('input[type="radio"]');
    radios.forEach(radio => {
        radio.addEventListener("change", updatePlaceholder);
    });
}
 
// Wait for B2C to load UI
const observer = new MutationObserver(() => {
    const textbox = document.querySelector('input[type="text"]');
    const radios = document.querySelectorAll('input[type="radio"]');
 
    if (textbox && radios.length > 0) {
        applyLogic();
        observer.disconnect();
    }
});
 
observer.observe(document.body, {
    childList: true,
    subtree: true
});
</script>
 
</body>
</html>
