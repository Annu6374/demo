<!DOCTYPE html>
<html>
<head>
    <title>Find Your Account</title>
 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
 
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
 
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
 
        h2 {
            text-align: center;
        }
 
        #api ul {
            list-style: none;
            padding: 0;
        }
 
        #api li {
            margin-bottom: 15px;
        }
 
        input[type="text"] {
            width: 100% !important;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
 
        .buttons {
            display: flex !important;
            justify-content: space-between;
        }
 
        button {
            padding: 10px;
            border-radius: 6px;
        }
 
        #continue {
            background: #0078d4;
            color: white;
        }
 
        #cancel {
            background: #ccc;
        }
 
    </style>
</head>
 
<body>
 
<div class="page-wrapper">
    <div class="container">
        <h2>Find Your Account</h2>
 
        <div id="api"></div>
    </div>
</div>
 
<script>
/* Wait until B2C renders the UI */
window.addEventListener('load', function () {
 
    function updatePlaceholder() {
        const selected = document.querySelector('input[type="radio"]:checked');
        const textbox = document.querySelector('input[type="text"]');
 
        if (!selected || !textbox) return;
 
        const value = selected.value;
 
        if (value === "email") {
            textbox.placeholder = "Enter your email address";
        } else if (value === "phone") {
            textbox.placeholder = "Enter your phone number";
        } else {
            textbox.placeholder = "Enter your account ID";
        }
    }
 
    // Run once initially
    setTimeout(updatePlaceholder, 500);
 
    // Listen for radio change
    document.addEventListener('change', function (e) {
        if (e.target.type === "radio") {
            updatePlaceholder();
        }
    });
 
});
</script>
 
</body>
</html>
