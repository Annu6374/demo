<!DOCTYPE html>
<html>
<head>
    <title>Find Your Account</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
 
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
 
        .input-group {
            display: none;
        }
 
        .active {
            display: block;
        }
    </style>
</head>
 
<body>
 
<div class="container">
    <h3>Find Your Account</h3>
 
    <!-- Radio buttons from B2C -->
    <div id="api"></div>
 
    <!-- Custom Inputs -->
    <div id="emailBox" class="input-group active">
        <input type="text" placeholder="Enter your email address">
    </div>
 
    <div id="phoneBox" class="input-group">
        <input type="text" placeholder="Enter your phone number">
    </div>
 
    <div id="accountBox" class="input-group">
        <input type="text" placeholder="Enter your account ID">
    </div>
</div>
 
<script>
function updateUI() {
 
    const selected = document.querySelector('input[type="radio"]:checked');
    if (!selected) return;
 
    const id = selected.id;
 
    document.getElementById("emailBox").classList.remove("active");
    document.getElementById("phoneBox").classList.remove("active");
    document.getElementById("accountBox").classList.remove("active");
 
    if (id.includes("email")) {
        document.getElementById("emailBox").classList.add("active");
    }
    else if (id.includes("phone")) {
        document.getElementById("phoneBox").classList.add("active");
    }
    else {
        document.getElementById("accountBox").classList.add("active");
    }
}
 
// Keep updating (handles B2C re-render)
setInterval(updateUI, 300);
</script>
 
</body>
</html>
