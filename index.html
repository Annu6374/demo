<!DOCTYPE html>
<html>
<head>
    <title>Find Your Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
 
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
 
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 340px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }
 
        h3 {
            text-align: center;
            margin-bottom: 20px;
        }
 
        /* Remove default B2C list */
        #api ul {
            list-style: none;
            padding: 0;
        }
 
        #api li {
            margin-bottom: 15px;
        }
 
        /* Style textbox */
        input[type="text"] {
            width: 100% !important;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
 
        /* Style radio buttons */
        input[type="radio"] {
            margin-right: 8px;
        }
 
        /* Buttons */
        .buttons {
            margin-top: 15px;
        }
 
        #continue {
            width: 100%;
            padding: 10px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
        }
 
        /* Hide unwanted B2C elements */
        .helpLink {
            display: none !important;
        }
    </style>
</head>
 
<body>
 
<div class="wrapper">
    <div class="card">
        <h3>Find Your Account</h3>
 
        <!-- B2C injects fields -->
        <div id="api"></div>
    </div>
</div>
 <script>
function getSelectedRadio() {
    const radios = document.querySelectorAll('input[type="radio"]');
 
    for (let i = 0; i < radios.length; i++) {
        if (radios[i].checked) {
            return radios[i];
        }
    }
    return null;
}
 
function updateUI() {
    const textbox = document.querySelector('input[type="text"]');
    const selected = getSelectedRadio();
 
    if (!textbox || !selected) return;
 
    const id = selected.id || "";
 
    let text = "Enter your value";
 
    if (id.indexOf("email") !== -1) {
        text = "Enter your email address";
    }
    else if (id.indexOf("phone") !== -1) {
        text = "Enter your phone number";
    }
    else if (id.indexOf("accountId") !== -1) {
        text = "Enter your account ID";
    }
 
    // Apply placeholder
    textbox.setAttribute("placeholder", text);
 
    // Also update label (more stable)
    const label = document.querySelector('label[for="identifierValue"]');
    if (label) {
        label.innerText = text;
    }
}
 
// Run continuously to survive B2C DOM refresh
setInterval(updateUI, 250);
</script>
 
</body>
</html>
